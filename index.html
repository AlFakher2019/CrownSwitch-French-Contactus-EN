<html>

<head>
    <meta charset="UTF-8">
    <title>Contact us Crown Switch France (EN)</title>
    <link href="css/form.css" rel="stylesheet" type="text/css">
    <script src="js/validation.js"></script>
</head>

<body class="zf-backgroundBg">
    <!-- Change or deletion of the name attributes in the input tag will lead to empty values on record submission-->
    <div class="zf-templateWidth">
        <form
            action='https://forms.zohopublic.eu/ookaportal/form/ContactusCrownSwitchFranceEN/formperma/HaiWSjEwh8BaYPzI31F1lIBHl0GK_7kZ6q_mdm_Ifqg/htmlRecords/submit'
            name='form' method='POST' onSubmit='javascript:document.charset="UTF-8"; return zf_ValidateAndSubmit();'
            accept-charset='UTF-8' enctype='multipart/form-data' id='form'>
            <input type="hidden" name="zf_referrer_name"
                value=""><!-- To Track referrals , place the referrer name within the " " in the above hidden input field -->
            <input type="hidden" name="zf_redirect_url"
                value=""><!-- To redirect to a specific page after record submission , place the respective url within the " " in the above hidden input field -->
            <input type="hidden" name="zc_gad"
                value=""><!-- If GCLID is enabled in Zoho CRM Integration, click details of AdWords Ads will be pushed to Zoho CRM -->
            <div class="zf-templateWrapper">
                <ul class="zf-tempHeadBdr">
                    
                </ul>
                <div class="zf-subContWrap zf-topAlign">
                    <ul>
                        <div class="zf-tempFrmWrapper zf-name  zf-namelarge">
                            <div class="zf-tempContDiv zf-twoType">
                                <div class="zf-nameWrapper">
                                    <span> <label>First Name <em class="zf-important"> *</em></label>
                                        <input type="text" maxlength="255" name="Name_First" fieldType=7
                                            placeholder="" /> </span>
                                    <span> <label>Last Name <em class="zf-important"> *</em></label>
                                        <input type="text" maxlength="255" name="Name_Last" fieldType=7
                                            placeholder="" /> </span>
                                    <div class="zf-clearBoth"></div>
                                </div>
                                <p id="Name_error" class="zf-errorMessage" style="display:none;">Invalid value</p>
                            </div>
                            <div class="zf-clearBoth"></div>
                        </div>
                        <div class="zfgrid_Wrapper">
                            <div class="zftwoColumn zfMultiColGrid">
                                <div class="zfCol">
                                    <div class="zf-tempFrmWrapper  zf-large "><label class="zf-labelName">
                                            Email
                                        </label>
                                        <div class="zf-tempContDiv">
                                            <span>
                                                <input type="text" name="Email" checktype="c5" value="" maxlength="255"
                                                    fieldType=9 placeholder="" /> </span>
                                            <p id="Email_error" class="zf-errorMessage" style="display: none;">Invalid
                                                value</p>
                                        </div>
                                        <div class="zf-clearBoth"></div>
                                    </div>
                                </div>
                                <div class="zfCol">
                                    <div class="zf-tempFrmWrapper zf- zf-large "><label class="zf-labelName"> Phone
                                        </label>
                                        <div class="zf-tempContDiv zf-phonefld">
                                            <div class="zf-phwrapper zf-phNumber">
                                                <span> <input type="text" compname="PhoneNumber"
                                                        name="PhoneNumber_countrycode" maxlength="20" checktype="c7"
                                                        value="" phoneFormat="1" isCountryCodeEnabled=false
                                                        fieldType="11" id="international_PhoneNumber_countrycode"
                                                        valType="number" phoneFormatType="1" placeholder="" />
                                                    <label>Number</label> </span>
                                                <div class="zf-clearBoth"></div>
                                            </div>
                                            <p id="PhoneNumber_error" class="zf-errorMessage" style="display:none;">
                                                Invalid value</p>
                                        </div>
                                        <div class="zf-clearBoth"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="zf-tempFrmWrapper  zf-large "><label class="zf-labelName">
                                Reason for contact:
                                <em class="zf-important"> *</em>
                            </label>
                            <div class="zf-tempContDiv">
                                <select class="zf-form-sBox" name="Dropdown" checktype="c1">
                                    <option selected="true" value="-Select-">-Select-</option>
                                    <option value="Order">Order</option>
                                    <option value="Repair">Repair</option>
                                    <option value="Warranty Registration">Warranty Registration</option>
                                    <option value="Delivery to countries outside Germany">Delivery to countries outside
                                        Germany</option>
                                    <option value="Pod Inquiry">Pod Inquiry</option>
                                    <option value="Payment / Invoice">Payment / Invoice</option>
                                    <option value="General Inquiry">General Inquiry</option>
                                    <option value="Virtual Assistance">Virtual Assistance</option>
                                </select>
                                <p id="Dropdown_error" class="zf-errorMessage" style="display:none;">Invalid value</p>
                            </div>
                            <div class="zf-clearBoth"></div>
                        </div>
                        <div class="zf-tempFrmWrapper  zf-large "><label class="zf-labelName">
                                Issue
                                <em class="zf-important"> *</em>
                            </label>
                            <div class="zf-tempContDiv">
                                <span>
                                    <input type="text" name="SingleLine" checktype="c1" value="" maxlength="255"
                                        fieldType=1 placeholder="" /> </span>
                                <p id="SingleLine_error" class="zf-errorMessage" style="display: none;">Invalid value
                                </p>
                            </div>
                            <div class="zf-clearBoth"></div>
                        </div>
                        <div class="zf-tempFrmWrapper  zf-large "><label class="zf-labelName">
                                News
                            </label>
                            <div class="zf-tempContDiv">
                                <span>
                                    <textarea name="MultiLine" checktype="c1" maxlength="65535"
                                        placeholder=""></textarea> </span>
                                <p id="MultiLine_error" class="zf-errorMessage" style="display: none;">Invalid value</p>
                            </div>
                            <div class="zf-clearBoth"></div>
                        </div>
                        <div class="zf-tempFrmWrapper zf-decesion ">
                            <div class="zf-tempContDiv"><label class="zf-labelName">
                                    We use the data you provide to respond to your inquiry. More information on how we
                                    process your personal data can be found in our Privacy Policy
                                </label>
                            </div>
                            <div class="zf-clearBoth"></div>
                        </div>
                    </ul>
                </div>
                <ul>
                    <li class="zf-fmFooter"><button class="zf-submitColor">Submit</button></li>
                </ul>
            </div>
        </form>
    </div>
    <script type="text/javascript">var dateAndMonthRegexFormateArray = zf_SetDateAndMonthRegexBasedOnDateFormate('dd-MMM-yyyy');
        var zf_DateRegex = new RegExp(dateAndMonthRegexFormateArray[0]);
        var zf_MonthYearRegex = new RegExp(dateAndMonthRegexFormateArray[1]);
        var zf_MandArray = ["Name_First", "Name_Last", "Dropdown", "SingleLine"];
        var zf_FieldArray = ["Name_First", "Name_Last", "Email", "PhoneNumber_countrycode", "Dropdown", "SingleLine", "MultiLine"];
        var isSalesIQIntegrationEnabled = false;
        var salesIQFieldsArray = [];</script>
